<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Inscription - Ressources Library</title>
</head>
        <button id="theme-toggle" class="theme-toggle" aria-label="Basculer le thème">
        🌙
        </button>
<body>
    <form id="register-form" action="">
        <h1>Inscription</h1>
        <label for="register-username">Nom d'utilisateur :</label>
        <input type="text" id="register-username" name="username" required>
        <label for="register-email">Email :</label>
        <input type="email" id="register-email" name="email" required>
        <label for="register-password">Mot de passe :</label>
        <input type="password" id="register-password" name="password" required>
        <label for="register-confirm-password">Confirmer le mot de passe :</label>
        <input type="password" id="register-confirm-password" name="confirm-password" required>
        <button type="submit">S'inscrire</button>
        <p>Vous avez déjà un compte ? <a style="text-decoration: none;" href="login.html">Connectez-vous</a></p>
    </form>
    <script src="sign-app.js"></script>
</body>
</html>
